<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Make a Ten — Maya's Games</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --accent: var(--ten-hue); }

    .ten-prompt {
      font-size: 1rem;
      color: var(--text-light);
      font-weight: 600;
    }
    .ten-number {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      color: var(--text);
    }
    .ten-equation {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-light);
      min-height: 36px;
    }
    .ten-equation span { color: var(--text); }

    /* 2x2 choice grid with bigger buttons */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 380px;
    }
    .choice-btn {
      padding: 28px 12px;
      font-size: 2.4rem;
    }
  </style>
</head>
<body>
  <main class="game-page">

    <div class="game-header">
      <button class="back-btn" onclick="history.back()">&#8592;</button>
      <span class="game-title">Make a Ten</span>
      <span style="font-size:0.85rem; color:var(--text-light); font-weight:600;" id="counter">1 / 8</span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>

    <!-- Question -->
    <div class="card" id="questionCard">
      <div class="ten-prompt" id="tenPrompt">What makes 10?</div>
      <div class="ten-number" id="mainNumber"></div>
      <div class="ten-equation" id="equation"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <!-- Choices -->
    <div class="choices" id="choices"></div>

    <!-- Completion -->
    <div class="card completion" id="completionCard">
      <div class="completion-star">&#127775;</div>
      <div class="completion-title">All done!</div>
      <div class="completion-score" id="completionScore"></div>
      <button class="btn btn-primary mt-16" onclick="location.href='../index.html'">
        Back to games
      </button>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/seed.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/completion.js"></script>
  <script>
    // ── Level config ───────────────────────────────────────────────────────
    // Make-a-Ten trains number bonds / complements. The global level scales the
    // "whole" (10 → 20 → 100) and, at L4, varies the blank position so the child
    // also reasons about the inverse (? + a = whole).
    const TOTAL = 8;
    let rng;               // seeded per (date, level) in init()
    let level = 1;
    let questions = [];

    function range(min, max) { const a = []; for (let x = min; x <= max; x++) a.push(x); return a; }
    function randOf(arr)     { return arr[Math.floor(rng() * arr.length)]; }

    function buildQuestions(lvl) {
      const qs = [];
      if (lvl <= 1) {
        // Whole = 10, parts 1–9
        seededPick(range(1, 9), TOTAL, rng).forEach(a => qs.push({ whole: 10, a, blankFirst: false }));
      } else if (lvl === 2) {
        // Bridging ten: make 20 from a teen number
        seededPick(range(11, 19), TOTAL, rng).forEach(a => qs.push({ whole: 20, a, blankFirst: false }));
      } else if (lvl === 3) {
        // Bonds within 20 (make 10 or make 20)
        for (let i = 0; i < TOTAL; i++) {
          const whole = randOf([10, 20]);
          qs.push({ whole, a: seededInt(1, whole - 1, rng), blankFirst: false });
        }
      } else if (lvl === 4) {
        // As L3, but the blank can be either addend (inverse reasoning)
        for (let i = 0; i < TOTAL; i++) {
          const whole = randOf([10, 20]);
          qs.push({ whole, a: seededInt(1, whole - 1, rng), blankFirst: rng() < 0.5 });
        }
      } else {
        // Level 5: complements to 100 in tens
        seededPick([10, 20, 30, 40, 50, 60, 70, 80, 90], TOTAL, rng)
          .forEach(a => qs.push({ whole: 100, a, blankFirst: false }));
      }
      return qs;
    }

    function choiceOpts(q) {
      return q.whole === 100
        ? { min: 10, max: 90, step: 10 }
        : { min: 1, max: q.whole - 1, step: 1 };
    }

    function equationHTML(q, answerText) {
      const blank = answerText != null ? `<span>${answerText}</span>` : '?';
      return q.blankFirst
        ? `${blank} + ${q.a} = ${q.whole}`
        : `${q.a} + ${blank} = ${q.whole}`;
    }

    let current = 0;
    let score = 0;
    let locked = false;
    const details = [];

    const mainNumberEl = document.getElementById('mainNumber');
    const equationEl   = document.getElementById('equation');
    const promptEl     = document.getElementById('tenPrompt');
    const feedbackEl   = document.getElementById('feedback');
    const counterEl    = document.getElementById('counter');
    const progressBar  = document.getElementById('progressBar');
    const choicesEl    = document.getElementById('choices');
    const questionCard = document.getElementById('questionCard');
    const completionCard = document.getElementById('completionCard');

    function wrongChoices(correct, n, opts) {
      const pool = [];
      for (let x = opts.min; x <= opts.max; x += opts.step) {
        if (x !== correct) pool.push(x);
      }
      // Prefer close numbers, then shuffle those
      pool.sort((a, b) => Math.abs(a - correct) - Math.abs(b - correct));
      return seededShuffle(pool.slice(0, n + 2), rng).slice(0, n);
    }

    function renderQuestion() {
      const q = questions[current];
      q.answer = q.whole - q.a;
      locked = false;

      promptEl.textContent = `Make ${q.whole}`;
      mainNumberEl.textContent = q.a;
      equationEl.innerHTML = equationHTML(q, null);
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      counterEl.textContent = `${current + 1} / ${TOTAL}`;
      progressBar.style.width = `${(current / TOTAL) * 100}%`;

      const wrongs = wrongChoices(q.answer, 3, choiceOpts(q));
      const allChoices = seededShuffle([q.answer, ...wrongs], rng);

      choicesEl.innerHTML = '';
      allChoices.forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = val;
        btn.addEventListener('click', () => handleChoice(val, q, btn));
        choicesEl.appendChild(btn);
      });
    }

    function handleChoice(val, q, btn) {
      if (locked) return;

      const isCorrect = val === q.answer;
      details.push({ whole: q.whole, a: q.a, answer: q.answer, given: val, correct: isCorrect, blankFirst: q.blankFirst });

      // Highlight all buttons
      document.querySelectorAll('.choice-btn').forEach(b => {
        const bVal = parseInt(b.textContent, 10);
        if (bVal === q.answer) b.classList.add('correct-choice');
        else if (b === btn && !isCorrect) b.classList.add('wrong-choice');
      });

      equationEl.innerHTML = equationHTML(q, q.answer);

      if (isCorrect) {
        score++;
        feedbackEl.textContent = 'Yes!';
        feedbackEl.className = 'feedback ok';
      } else {
        feedbackEl.textContent = `It's ${q.answer}. Try to remember it!`;
        feedbackEl.className = 'feedback err';
      }

      locked = true;
      setTimeout(advance, 1100);
    }

    function advance() {
      current++;
      if (current >= TOTAL) {
        finish();
      } else {
        renderQuestion();
      }
    }

    function finish() {
      questionCard.classList.add('hidden');
      choicesEl.classList.add('hidden');
      completionCard.classList.add('visible');
      progressBar.style.width = '100%';
      document.getElementById('completionScore').textContent =
        `${score} out of ${TOTAL} correct`;
      markDone('make_ten', score, TOTAL);
      saveResult({ game: 'make_ten', score, total: TOTAL, details: { level, questions: details } });
    }

    // ── Init (async — level comes from Supabase) ────────────────────────────
    (async function init() {
      level = await fetchLevel();
      rng = todayRNG(2 + level * 100);   // deterministic per (date, level)
      questions = buildQuestions(level);
      renderQuestion();
    })();
  </script>
</body>
</html>
