<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Shut the Box — Maya's Games</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --accent: var(--box-hue); }
    .game-page { gap: 20px; }

    .roll-display {
      text-align: center;
      font-size: 1rem;
      color: var(--text-light);
      font-weight: 600;
      min-height: 24px;
    }

    .dice-area {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }

    /* SVG dice */
    .die-svg {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: white;
      border: 3px solid var(--border);
      flex-shrink: 0;
    }
    .die-svg.rolling { animation: diceTumble 0.32s linear infinite; }
    @keyframes diceTumble {
      0%   { transform: rotate(0deg)   translateY(0)    scale(1); }
      25%  { transform: rotate(90deg)  translateY(-10px) scale(1.08); }
      50%  { transform: rotate(180deg) translateY(0)    scale(1); }
      75%  { transform: rotate(270deg) translateY(-10px) scale(1.08); }
      100% { transform: rotate(360deg) translateY(0)    scale(1); }
    }
    .die-svg.settle { animation: diceSettle 0.28s ease; }
    @keyframes diceSettle {
      0%   { transform: scale(1.25); }
      55%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    .best-target {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text-light);
      min-height: 22px;
    }
    .best-target .num { color: var(--box-hue); }

    .roll-sum {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      min-height: 40px;
    }

    .box-tiles {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 4px;
    }

    .selection-info {
      font-size: 1rem;
      color: var(--text-light);
      font-weight: 600;
      text-align: center;
      min-height: 24px;
    }
    .selection-info span { color: var(--text); font-weight: 800; }

    .action-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 380px;
    }

    .remaining-label {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* Game over state */
    .game-over-info {
      font-size: 1rem;
      text-align: center;
      color: var(--text-light);
      line-height: 1.6;
    }
    .game-over-info strong { color: var(--text); font-size: 1.3rem; }
  </style>
</head>
<body>
  <main class="game-page">

    <div class="game-header">
      <button class="back-btn" onclick="history.back()">&#8592;</button>
      <span class="game-title">Shut the Box</span>
    </div>

    <!-- Personal best target -->
    <div class="best-target" id="bestTarget"></div>

    <!-- Tiles -->
    <div class="box-tiles" id="tilesRow"></div>

    <!-- Dice + roll info -->
    <div class="card" style="gap:14px; padding:24px 20px;">
      <div class="dice-area" id="diceArea">
        <svg class="die-svg" id="die1" viewBox="0 0 72 72"></svg>
        <svg class="die-svg" id="die2" viewBox="0 0 72 72"></svg>
      </div>

      <div class="roll-sum" id="rollSum"></div>

      <div class="selection-info" id="selectionInfo">Roll the dice to start!</div>

      <div class="action-area">
        <button class="btn btn-primary" id="rollBtn" onclick="rollDice(2)" style="width:100%">
          &#127922; Roll 2 Dice
        </button>
        <button class="btn btn-secondary hidden" id="oneDieBtn" onclick="rollDice(1)" style="width:100%">
          &#127922; Roll 1 die
        </button>
        <button class="btn btn-secondary hidden" id="closeBtn" onclick="closeTiles()" style="width:100%">
          Close selected tiles
        </button>
        <div class="remaining-label" id="remainingLabel"></div>
      </div>
    </div>

    <!-- Completion -->
    <div class="card completion" id="completionCard">
      <div class="completion-star" id="completionStar">&#127882;</div>
      <div class="completion-title" id="completionTitle">Game over!</div>
      <div class="game-over-info" id="gameOverInfo"></div>
      <button class="btn btn-primary mt-16" onclick="location.href='../index.html'">
        Back to games
      </button>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/seed.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/completion.js"></script>
  <script>
    // ── SVG die faces ────────────────────────────────────────────────────
    // Dot positions as (cx,cy) — centred on a 72×72 viewBox, r=6
    const DOT_POSITIONS = {
      1: [[36,36]],
      2: [[20,20],[52,52]],
      3: [[20,20],[36,36],[52,52]],
      4: [[20,20],[52,20],[20,52],[52,52]],
      5: [[20,20],[52,20],[36,36],[20,52],[52,52]],
      6: [[20,18],[52,18],[20,36],[52,36],[20,54],[52,54]],
    };

    function renderDie(svgEl, value) {
      svgEl.innerHTML = '';
      const dots = DOT_POSITIONS[value] || [];
      dots.forEach(([cx,cy]) => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
        circle.setAttribute('cx', cx);
        circle.setAttribute('cy', cy);
        circle.setAttribute('r', 7);
        circle.setAttribute('fill', '#1a1a2e');
        svgEl.appendChild(circle);
      });
    }

    // ── Level config ───────────────────────────────────────────────────────
    // Shut the Box only loosely tracks the fact-fluency scale, so we scale it by
    // board size (maxTile) and by when the "roll 1 die" aid is offered — generous
    // at low levels, standard rule mid, gone at L5. singleAid(openSum, maxOpen).
    const LEVELS = {
      1: { maxTile: 9,  singleAid: (openSum) => openSum <= 8 },
      2: { maxTile: 9,  singleAid: (openSum) => openSum <= 6 },
      3: { maxTile: 9,  singleAid: (_, maxOpen) => maxOpen <= 6 },
      4: { maxTile: 12, singleAid: (_, maxOpen) => maxOpen <= 6 },
      5: { maxTile: 12, singleAid: () => false },
    };

    let rng;
    let level = 1;
    let config = LEVELS[1];
    let maxTile = 9;
    let maxScore = 45;      // sum 1..maxTile
    let open = [];          // index i → tile (i+1); true = open
    let BEST_KEY = '';      // per-level (scores aren't comparable across board sizes)

    let currentRoll = 0;
    let selected = new Set();
    let gameEnded = false;
    let rollCount = 0;
    const rollHistory = [];

    // ── Personal best (localStorage; DB is write-only from child side) ─────
    function getBest() {
      const raw = localStorage.getItem(BEST_KEY);
      return raw === null ? null : parseInt(raw, 10);
    }
    function saveBest(score) {
      const b = getBest();
      if (b === null || score < b) localStorage.setItem(BEST_KEY, String(score));
    }
    function renderBestTarget() {
      const b = getBest();
      const el = document.getElementById('bestTarget');
      if (b === null) {
        el.innerHTML = '🏆 First game — set your best score!';
      } else if (b === 0) {
        el.innerHTML = '🏆 Your best: <span class="num">a perfect game!</span>';
      } else {
        el.innerHTML = `🏆 Beat your best: <span class="num">${b}</span> left`;
      }
    }

    const tilesRow     = document.getElementById('tilesRow');
    const die1El       = document.getElementById('die1');
    const die2El       = document.getElementById('die2');
    const rollSumEl    = document.getElementById('rollSum');
    const selectionInfo = document.getElementById('selectionInfo');
    const rollBtn      = document.getElementById('rollBtn');
    const oneDieBtn    = document.getElementById('oneDieBtn');
    const closeBtn     = document.getElementById('closeBtn');
    const remainingLabel = document.getElementById('remainingLabel');
    const completionCard = document.getElementById('completionCard');

    // ── Helpers ────────────────────────────────────────────────────────────
    function openSumOf()  { return open.reduce((s,v,i) => v ? s + (i+1) : s, 0); }
    function maxOpenOf()  { return open.reduce((m,v,i) => v ? (i+1) : m, 0); }
    function openTilesList() { return open.map((v,i) => v ? i+1 : null).filter(Boolean); }

    function canSingle() {
      const openSum = openSumOf();
      if (openSum === 0) return false;
      return config.singleAid(openSum, maxOpenOf());
    }

    function showRollButtons() {
      rollBtn.classList.remove('hidden');
      oneDieBtn.classList.toggle('hidden', !canSingle());
    }

    // ── Tile rendering ───────────────────────────────────────────────────
    function renderTiles() {
      tilesRow.innerHTML = '';
      for (let i = 0; i < maxTile; i++) {
        const num = i + 1;
        const btn = document.createElement('button');
        btn.className = 'box-tile' + (open[i] ? '' : ' closed');
        btn.textContent = num;
        btn.dataset.idx = i;
        if (open[i]) {
          btn.addEventListener('click', () => toggleSelect(i));
        }
        tilesRow.appendChild(btn);
      }
      updateSelectionUI();
    }

    function toggleSelect(idx) {
      if (!open[idx] || gameEnded || currentRoll === 0) return;
      if (selected.has(idx)) {
        selected.delete(idx);
      } else {
        selected.add(idx);
      }
      // Reflect in DOM
      document.querySelectorAll('.box-tile').forEach(btn => {
        const i = parseInt(btn.dataset.idx, 10);
        if (selected.has(i)) btn.classList.add('selected');
        else btn.classList.remove('selected');
      });
      updateSelectionUI();
    }

    function updateSelectionUI() {
      const selSum = Array.from(selected).reduce((s,i) => s + (i+1), 0);
      const openTiles = openSumOf();
      remainingLabel.textContent = openTiles === 0
        ? 'Box is shut!'
        : `Open tiles total: ${openTiles}`;

      if (currentRoll === 0) {
        selectionInfo.textContent = 'Roll the dice to start!';
        closeBtn.classList.add('hidden');
        showRollButtons();
      } else if (selected.size === 0) {
        selectionInfo.innerHTML = `Rolled <span>${currentRoll}</span> — tap tiles that add up to ${currentRoll}`;
        closeBtn.classList.add('hidden');
      } else if (selSum === currentRoll) {
        selectionInfo.innerHTML = `<span>${Array.from(selected).map(i=>i+1).join(' + ')} = ${currentRoll}</span> ✓`;
        closeBtn.classList.remove('hidden');
      } else if (selSum > currentRoll) {
        selectionInfo.innerHTML = `Too big! (${selSum}) — tap to deselect`;
        closeBtn.classList.add('hidden');
      } else {
        selectionInfo.innerHTML = `${selSum} so far — need ${currentRoll - selSum} more`;
        closeBtn.classList.add('hidden');
      }
    }

    // ── Roll dice ─────────────────────────────────────────────────────────
    function rollDice(numDice) {
      if (gameEnded) return;

      // Clear previous selection
      selected.clear();
      renderTiles();

      const d1 = seededInt(1, 6, rng);
      const d2 = numDice === 2 ? seededInt(1, 6, rng) : 0;
      currentRoll = d1 + d2;
      rollCount++;

      rollSumEl.textContent = '';
      rollBtn.classList.add('hidden');
      oneDieBtn.classList.add('hidden');
      die2El.style.display = numDice === 2 ? '' : 'none';

      // Tumble: spin the dice while flashing random faces, then settle.
      // Faces during the tumble use Math.random (cosmetic only) so the real
      // seeded roll (d1/d2) stays deterministic per day.
      die1El.classList.remove('settle'); die2El.classList.remove('settle');
      void die1El.offsetWidth; // force reflow
      die1El.classList.add('rolling');
      if (numDice === 2) die2El.classList.add('rolling');

      const tumble = setInterval(() => {
        renderDie(die1El, 1 + Math.floor(Math.random() * 6));
        if (numDice === 2) renderDie(die2El, 1 + Math.floor(Math.random() * 6));
      }, 70);

      setTimeout(() => {
        clearInterval(tumble);
        die1El.classList.remove('rolling');
        die2El.classList.remove('rolling');
        die1El.classList.add('settle');
        if (numDice === 2) die2El.classList.add('settle');
        renderDie(die1El, d1);
        if (numDice === 2) renderDie(die2El, d2);
        rollSumEl.textContent = currentRoll;

        rollHistory.push({ d1, d2: numDice === 2 ? d2 : null, total: currentRoll });
        updateSelectionUI();

        // Check if any valid move exists
        if (!hasValidMove(openTilesList(), currentRoll)) {
          endGame();
        }
      }, 700);
    }

    // ── Close selected tiles ──────────────────────────────────────────────
    function closeTiles() {
      const selSum = Array.from(selected).reduce((s,i) => s + (i+1), 0);
      if (selSum !== currentRoll) return;

      selected.forEach(idx => { open[idx] = false; });
      selected.clear();
      currentRoll = 0;
      rollSumEl.textContent = '';
      die2El.style.display = '';
      renderTiles();  // re-shows roll buttons via updateSelectionUI

      // Check if box is fully shut
      if (open.every(v => !v)) {
        endGame(true);
      }
    }

    // ── Subset sum check ──────────────────────────────────────────────────
    function hasValidMove(tiles, target) {
      function check(idx, remaining) {
        if (remaining === 0) return true;
        if (idx >= tiles.length || remaining < 0) return false;
        return check(idx + 1, remaining - tiles[idx]) || check(idx + 1, remaining);
      }
      return check(0, target);
    }

    // ── End game ──────────────────────────────────────────────────────────
    function endGame(shutCompletely) {
      gameEnded = true;
      const remaining = openSumOf();
      const prevBest = getBest();
      const newBest = prevBest === null || remaining < prevBest;
      saveBest(remaining);

      document.querySelector('.card:not(.completion)').classList.add('hidden');
      tilesRow.classList.add('hidden');
      completionCard.classList.add('visible');

      const starEl  = document.getElementById('completionStar');
      const titleEl = document.getElementById('completionTitle');
      const infoEl  = document.getElementById('gameOverInfo');

      const bestNote = newBest
        ? `<br>🎉 New best score!`
        : (prevBest !== null ? `<br>Your best: ${prevBest === 0 ? 'perfect game' : prevBest + ' left'}` : '');

      if (shutCompletely) {
        starEl.innerHTML    = '&#127881;';
        titleEl.textContent = 'Box shut!';
        infoEl.innerHTML    = `You closed every tile! Perfect game!${bestNote}`;
      } else {
        infoEl.innerHTML  = `Tiles left open: <strong>${openTilesList().join(', ')}</strong><br>
          Score: <strong>${remaining}</strong> (lower is better!)${bestNote}`;
        starEl.innerHTML  = '&#128077;';
        titleEl.textContent = 'Game over!';
      }

      // score = remaining tiles (lower = better); 0 = perfect
      markDone('shut_box', remaining, maxScore);
      saveResult({
        game: 'shut_box',
        score: remaining,
        total: maxScore,
        details: { level, rolls: rollHistory, remaining, open_tiles: openTilesList() }
      });
    }

    // ── Init (async — level comes from Supabase) ────────────────────────────
    (async function init() {
      level = await fetchLevel();
      config = LEVELS[level] || LEVELS[1];
      maxTile = config.maxTile;
      maxScore = maxTile * (maxTile + 1) / 2;
      open = Array(maxTile).fill(true);
      BEST_KEY = (window.CHILD_NAME || 'maya') + '_best_shut_box_L' + level;
      rng = todayRNG(3 + level * 100);   // deterministic per (date, level)

      renderDie(die1El, 6);
      renderDie(die2El, 6);
      renderTiles();
      renderBestTarget();
    })();
  </script>
</body>
</html>
